<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Footprint Cleaner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0b;
            --surface: #111113;
            --surface-2: #1a1a1d;
            --border: #2a2a2e;
            --border-light: #3a3a3f;
            --text: #f0f0f2;
            --text-muted: #8a8a95;
            --text-dim: #5a5a65;
            --accent: #e8ff3a;
            --accent-dim: #b8cc2e;
            --danger: #ff4444;
            --danger-dim: #cc2222;
            --success: #3aff8a;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAV */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 11, 0.92);
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .nav-logo {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-link {
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border: 1px solid transparent;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--text);
            border-color: var(--border);
        }

        .nav-link.danger {
            color: var(--danger);
        }

        .nav-link.danger:hover {
            border-color: var(--danger);
        }

        /* MAIN */
        main {
            flex: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 4rem 2.5rem 6rem;
            width: 100%;
        }

        /* STEP HEADER */
        .step-label {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.6rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .card + .card {
            margin-top: 0;
        }

        /* FORM ELEMENTS */
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            border-color: var(--accent);
        }

        input[type="file"] {
            cursor: pointer;
            font-family: var(--font-display);
        }

        input[type="file"]::file-selector-button {
            background: var(--surface-2);
            border: 1px solid var(--border-light);
            color: var(--text);
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.4rem 0.9rem;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 1rem;
            transition: all 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--border);
        }

        /* CHECKBOXES */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 0.7rem 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .checkbox-item:hover {
            border-color: var(--border-light);
            background: #222228;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .checkbox-item span {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: color 0.15s;
        }

        .checkbox-item:has(input:checked) {
            border-color: var(--accent);
            background: rgba(232, 255, 58, 0.05);
        }

        .checkbox-item:has(input:checked) span {
            color: var(--accent);
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 0.8rem 1.8rem;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #0a0a0b;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-dim);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--border-light);
        }

        /* TWEET ITEMS */
        .tweet-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.6rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            transition: border-color 0.15s;
        }

        .tweet-item:has(input:checked) {
            border-color: var(--danger);
            background: rgba(255, 68, 68, 0.04);
        }

        .tweet-item input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: var(--danger);
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 3px;
        }

        .tweet-content {
            flex: 1;
            min-width: 0;
        }

        .tweet-motivo {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--danger);
            margin-bottom: 0.3rem;
        }

        .tweet-texto {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
            word-break: break-word;
        }

        /* DIVIDER */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 2.5rem 0;
        }

        /* STAT */
        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem 1.5rem;
            flex: 1;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        /* ALERTS */
        .alert {
            padding: 1rem 1.2rem;
            border-radius: 6px;
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: rgba(58, 255, 138, 0.08);
            border: 1px solid rgba(58, 255, 138, 0.25);
            color: var(--success);
        }

        .alert-warning {
            background: rgba(232, 255, 58, 0.06);
            border: 1px solid rgba(232, 255, 58, 0.2);
            color: var(--accent);
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem 2.5rem;
            text-align: center;
        }

        footer p {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        /* HELPER */
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mt-4 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .flex-gap { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

        @media (max-width: 600px) {
            main { padding: 2rem 1.25rem 4rem; }
            nav { padding: 1.25rem 1.25rem; }
            .stats-row { flex-direction: column; gap: 0.75rem; }
            .checkbox-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <nav>
        <a href="/" class="nav-logo">X Footprint Cleaner</a>
        <div class="nav-links">
            {% if session.get('token') %}
            <a href="/logout" class="nav-link danger">Cerrar sesion</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>X Footprint Cleaner &mdash; Gestiona tu huella digital de forma privada</p>
    </footer>
</div>
</body>
</html>
